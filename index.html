<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- =========================
         START SCREEN
    ========================== -->

    <div id="startScreen">

        <h1>SKY STRIKE</h1>

        <p class="subtitle">
            Pixel Air Combat Training
        </p>

        <button id="startBtn">
            START MISSION
        </button>

    </div>


    <!-- =========================
         GAME UI
    ========================== -->

    <div id="gameContainer">

        <!-- BACKGROUND IMAGE -->
        <!-- Replace with background.png -->

        <img
            id="background"
            src="images/background.png"
            alt="Background">

        <!-- SCORE PANEL -->

        <div id="hud">

            <div class="hudBox">
                Score:
                <span id="score">0</span>
            </div>

            <div class="hudBox">
                Combo:
                <span id="combo">0</span>
            </div>

            <div class="hudBox">
                Time:
                <span id="timer">60</span>
            </div>

        </div>

        <!-- AIRCRAFT SPAWN AREA -->

        <div id="gameArea">

        </div>

        <!-- CUSTOM CROSSHAIR -->

        <!-- Replace with crosshair.png -->

        <img
            id="crosshair"
            src="images/crosshair.png"
            alt="Crosshair">

    </div>


    <!-- =========================
         GAME OVER SCREEN
    ========================== -->

    <div id="gameOverScreen">

        <h1>MISSION COMPLETE</h1>

        <p>
            Final Score:
            <span id="finalScore">0</span>
        </p>

        <button id="restartBtn">
            PLAY AGAIN
        </button>

    </div>

    <script src="script.js"></script>

</body>

</html>
