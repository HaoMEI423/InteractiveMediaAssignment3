<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Air Defence</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- =====================================================
    DESIGN DOCUMENTATION (HTML LEVEL COMMENT)

    CORE DESIGN INTENT:

    This project is a browser-based click interaction game
    where players act as an air defense operator.

    The visual language is inspired by retro arcade shooters
    and pixel-art military aviation games.

    Key design goals:

    1. Clear interaction loop (click → feedback → reward)
    2. Immediate visual feedback
    3. Simple but engaging difficulty progression
    4. Minimal UI distraction
    5. Strong thematic consistency (pixel air combat)

    CONTEXT INFLUENCE:

    References include:
    - Whack-a-Mole (reaction-based clicking)
    - Cookie Clicker (repetitive reward loop)
    - Arcade shooters (Galaga, 1942)

    These references informed:
    - Target spawning system
    - Score feedback system
    - Increasing difficulty via enemy variety

    AI USAGE:

    ChatGPT was used as a learning assistant for:
    - Structuring DOM-based game states
    - Debugging animation timing issues
    - Understanding event-driven interaction loops

===================================================== -->

<!-- =========================
    START SCREEN
========================= -->

<div id="startScreen">

    <h1 class="title">PIXEL AIR DEFENCE</h1>

    <p class="subtitle">
        Click to eliminate hostile aircraft
    </p>

    <button id="startBtn">START MISSION</button>
</div>



<!-- =========================
    GAME SCREEN
========================= -->

<div id="gameContainer">

    <img id="background" src="assets/background.png" alt="background">

    <!-- HUD -->
    <div id="hud">
        <div class="hudBox">Score: <span id="score">0</span></div>
        <div class="hudBox">Combo: <span id="combo">0</span></div>
        <div class="hudBox">Time: <span id="timer">60</span></div>
    </div>

    <!-- GAME AREA -->
    <div id="gameArea"></div>

</div>

<!-- =========================
    GAME OVER SCREEN
========================= -->
<div id="gameOverScreen">

    <h1>MISSION COMPLETE</h1>

    <p>Final Score: <span id="finalScore">0</span></p>

    <button id="restartBtn">RESTART</button>

</div>

<script src="script.js"></script>

</body>
</html>
